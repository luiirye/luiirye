name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Clone github-stats
        run: git clone https://github.com/jstrieb/github-stats.git

      - name: Install dependencies
        run: |
          cd github-stats
          pip install -r requirements.txt

      - name: Generate stats
        run: |
          cd github-stats
          python stats.py
        env:
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: luiirye

      - name: Move generated files
        run: |
          mkdir -p profile
          cp github-stats/generated/overview.svg profile/stats.svg
          cp github-stats/generated/languages.svg profile/top-langs.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add profile/
          git diff --cached --quiet || git commit -m "Update stats"
          git push
