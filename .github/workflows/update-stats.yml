name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate SVGs
        run: |
          mkdir -p profile

          curl -o profile/stats.svg \
            "https://github-readme-stats-zeta-ten-93.vercel.app/api?username=luiirye&theme=github_dark&hide_border=true&show_icons=true"

          curl -o profile/top-langs.svg \
            "https://github-readme-stats-zeta-ten-93.vercel.app/api/top-langs?username=luiirye&theme=github_dark&hide_border=true&layout=donut"

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add profile/
          git diff --cached --quiet || git commit -m "Update stats"
          git push