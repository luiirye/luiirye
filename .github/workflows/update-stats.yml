name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Clone github-readme-stats
        run: git clone https://github.com/anuraghazra/github-readme-stats.git

      - name: Install dependencies
        run: |
          cd github-readme-stats
          npm install

      - name: Start server and generate SVGs
        run: |
          cd github-readme-stats
          node api/index.js &
          sleep 5

          mkdir -p ../profile

          curl "http://localhost:9000/api?username=luiirye&theme=github_dark&hide_border=true&show_icons=true" \
            -H "Authorization: token ${{ secrets.STATS_TOKEN }}" \
            -o ../profile/stats.svg

          curl "http://localhost:9000/api/top-langs?username=luiirye&theme=github_dark&hide_border=true&layout=donut" \
            -H "Authorization: token ${{ secrets.STATS_TOKEN }}" \
            -o ../profile/top-langs.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add profile/
          git diff --cached --quiet || git commit -m "Update stats"
          git push
